          const img = m.poster_path
            ? `<img class="nf-poster" src="${P}${m.poster_path}" alt="" loading="lazy"/>`
            : `<div class="nf-poster-fallback">🎬</div>`;
          return `
            <div class="nf-card" onclick="openM(${m.id})">
              <div class="nf-card-inner">
                ${img}
                <div class="nf-card-info">
                  <div class="nf-card-title">${m.title}</div>
                  <div class="nf-card-row1">
                    <button class="nf-play-btn" onclick="event.stopPropagation();openM(${m.id})"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
                    <button class="nf-info-btn" onclick="event.stopPropagation();openM(${m.id})">ⓘ</button>
                    <button class="nf-mylist-btn${saved?' saved':''}" data-mylist-id="${m.id}"
                      title="${saved?'Remove from My List':'Add to My List'}"
                      onclick="event.stopPropagation();toggleMyList(${m.id},'${(m.title||'').replace(/'/g,"\\'")}','${m.poster_path||''}')">
                      ${saved ? '✓' : '+'}
                    </button>
                    <span class="nf-rating ${rc}">★ ${rat}</span>
                  </div>
                  <div class="nf-tags">
                    <span class="nf-tag">${year}</span>
                    ${genres.map(g => `<span class="nf-tag">${g}</span>`).join('')}
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');
      });
    };

    // ─────────────────────────────────────────────
    // 10. ENHANCE loadAllRows — inject CW + BYW sections
    // ─────────────────────────────────────────────
    // ── K-DRAMA: RENDER ROW ──
    function renderKdramaRow(rowId, shows) {

    // ── K-DRAMA: WATCH TV EMBED ──
    let tvWatchVisible = false;
    let tvEmbedIndex   = 0;
    let tvEmbedQueue   = [];

    function buildTVEmbedQueue(tmdbId, season, episode) {
      return [
        { name: 'VidLink',     url: `https://vidlink.pro/tv/${tmdbId}/${season}/${episode}` },
        { name: 'VidLink Alt', url: `https://vidlink.pro/tv/${tmdbId}/${season}/${episode}?autoplay=true` },
      ];
    }

    function toggleWatchTV(btn) {
      const wrap = document.getElementById('watchArea');
      if (!wrap) return;
      if (tvWatchVisible) {
        wrap.innerHTML = ''; wrap.style.display = 'none';
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg> Watch K-Drama'; tvWatchVisible = false;
        tvEmbedQueue = []; tvEmbedIndex = 0;
      } else {
        const id  = btn.dataset.id;
        const ep  = parseInt(btn.dataset.ep  || '1');
        const sea = parseInt(btn.dataset.sea || '1');
        tvEmbedQueue = buildTVEmbedQueue(id, sea, ep);
        tvEmbedIndex = 0;
        loadTVEmbed(btn);
      }
    }

    function loadTVEmbed(btn) {
      const wrap = document.getElementById('watchArea');
      const id   = btn.dataset.id;
      if (tvEmbedIndex >= tvEmbedQueue.length) {
        wrap.style.display = 'block';
        wrap.innerHTML = `
          <div class="no-trailer" style="margin-top:16px;text-align:center;padding:24px 16px;">
            <div style="margin-bottom:12px;opacity:0.4"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
            <div style="font-size:14px;font-weight:600;margin-bottom:6px;">No stream found</div>
            <div style="font-size:12px;color:var(--text-faint);margin-bottom:16px;">This show may not be available yet.</div>
          </div>`;
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg> Watch K-Drama'; tvWatchVisible = false; return;
      }
      const entry = tvEmbedQueue[tvEmbedIndex];
      const sea   = btn.dataset.sea || '1';
      const ep    = btn.dataset.ep  || '1';
      const totalEps = parseInt(btn.dataset.totaleps || '1');
      const totalSeas = parseInt(btn.dataset.totalseas || '1');

      // Build prev/next ep controls
      let epControls = '';
      const curSea = parseInt(sea); const curEp = parseInt(ep);
      const prevBtn = (curEp > 1 || curSea > 1)
        ? `<button onclick="tvChangeEp(${curEp > 1 ? curEp-1 : 1}, ${curEp > 1 ? curSea : Math.max(curSea-1,1)})" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:inherit;font-size:11px;padding:8px 14px;border-radius:4px;cursor:pointer;">◀ Prev Ep</button>`
        : '';
      const nextBtn = `<button onclick="tvChangeEp(${curEp+1}, ${curSea})" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:inherit;font-size:11px;padding:8px 14px;border-radius:4px;cursor:pointer;">Next Ep <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>`;

      wrap.style.display = 'block';
      wrap.innerHTML = `
        <div class="trailer-wrap" style="margin-top:16px">
          <iframe src="${entry.url}" allowfullscreen allow="autoplay; fullscreen; encrypted-media" referrerpolicy="no-referrer"></iframe>
        </div>
        <div style="text-align:center;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;">S${String(curSea).padStart(2,'0')} · E${String(curEp).padStart(2,'0')} · ${entry.name}</span>
          ${prevBtn}
          ${nextBtn}
          <button onclick="tvNextSource()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:inherit;font-size:11px;padding:8px 14px;border-radius:4px;cursor:pointer;">Try Another Source</button>
        </div>`;
      btn.innerHTML = '✕ Close Player'; tvWatchVisible = true;
    }

    function tvNextSource() {
      tvEmbedIndex++;
      const btn = document.getElementById('watchBtn');
      if (btn) loadTVEmbed(btn);
    }

    function tvChangeEp(ep, sea) {
      const btn = document.getElementById('watchBtn');
      if (!btn) return;
      btn.dataset.ep  = ep;
      btn.dataset.sea = sea;
      tvEmbedIndex = 0;
      tvEmbedQueue = buildTVEmbedQueue(btn.dataset.id, sea, ep);
      loadTVEmbed(btn);
    }

                    data-id="${id}"
                    data-sea="1" data-ep="1"
                    data-totalseas="${seasons}"

                    onclick="toggleWatchTV(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg> Watch K-Drama</button>

          </div>`;

        document.getElementById('modal').scrollTop = 0;
      } catch {
        document.getElementById('minner').innerHTML = `<div class="empty-wrap"><div class="empty-ico">⚠️</div><div class="empty-ttl">Failed to load</div></div>`;
      }
    }

    // ── MIXED ROW RENDERER (movies + K-dramas combined) ──
    function renderMixedRow(rowId, movies, shows) {
      const row = document.getElementById(rowId);
      if (!row) return;

      const movieCards = movies.filter(m => m.poster_path).map(m => {
        const year = m.release_date ? m.release_date.slice(0,4) : '—';
        const rat  = m.vote_average ? m.vote_average.toFixed(1) : '—';
        const rc   = ratingClass(m.vote_average);
        const saved = isInMyList(m.id);
        return `
          <div class="nf-card" onclick="openM(${m.id})">
            <div class="nf-card-inner">
              <img class="nf-poster" src="${P}${m.poster_path}" alt="" loading="lazy"/>
              <div class="nf-card-info">
                <div class="nf-card-title">${m.title}</div>
                <div class="nf-card-row1">
                  <button class="nf-play-btn" onclick="event.stopPropagation();openM(${m.id})"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
                  <button class="nf-info-btn" onclick="event.stopPropagation();openM(${m.id})">ⓘ</button>
                  <button class="nf-mylist-btn${saved?' saved':''}" data-mylist-id="${m.id}"
                    title="${saved?'Remove from My List':'Add to My List'}"
                    onclick="event.stopPropagation();toggleMyList(${m.id},'${(m.title||'').replace(/'/g,"\\'")}','${m.poster_path||''}')">
                    ${saved ? '✓' : '+'}
                  </button>
                  <span class="nf-rating ${rc}">★ ${rat}</span>
                </div>
                <div class="nf-tags">
                  <span class="nf-tag">${year}</span>
                </div>
              </div>
            </div>
          </div>`;
      });

      const showCards = shows.filter(s => s.poster_path).map(s => {
        const year = (s.first_air_date || '').slice(0,4) || '—';
        const rat  = s.vote_average ? s.vote_average.toFixed(1) : '—';
        const rc   = ratingClass(s.vote_average);
        return `
          <div class="nf-card" onclick="openTV(${s.id})">
            <div class="nf-card-inner">
              <img class="nf-poster" src="${P}${s.poster_path}" alt="" loading="lazy"/>
              <div class="nf-card-info">
                <div class="nf-card-title">${s.name || s.original_name}</div>
                <div class="nf-card-row1">
                  <button class="nf-play-btn" onclick="event.stopPropagation();openTV(${s.id})"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
                  <button class="nf-info-btn" onclick="event.stopPropagation();openTV(${s.id})">ⓘ</button>
                  <span class="nf-rating ${rc}">★ ${rat}</span>
                </div>
                <div class="nf-tags">
                  <span class="nf-tag">${year}</span>
                  <span class="nf-tag" style="color:var(--red)">K-Drama</span>
                </div>
              </div>
            </div>
          </div>`;
      });

      // Shuffle movies and dramas together
      const all = [...movieCards, ...showCards];
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      row.innerHTML = all.join('');
    }

    const _origLoadAllRows = loadAllRows;
    window.loadAllRows = async function() {
      showLoading();
      try {
        const today = new Date().toISOString().slice(0, 10);
        const [
          trendR1, trendR2, trendR3,
          topR, upR,
          kdTrendR1, kdTrendR2,
          kdTopR1, kdTopR2
        ] = await Promise.all([
          fetch(`${B}/trending/movie/week?api_key=${K}&page=1`).then(r=>r.json()),
          fetch(`${B}/trending/movie/week?api_key=${K}&page=2`).then(r=>r.json()),
          fetch(`${B}/trending/movie/week?api_key=${K}&page=3`).then(r=>r.json()),
          fetch(`${B}/movie/top_rated?api_key=${K}&language=en-US`).then(r=>r.json()),
          fetch(`${B}/discover/movie?api_key=${K}&language=en-US&sort_by=popularity.desc&primary_release_date.gte=2026-01-01&primary_release_date.lte=2026-12-31&page=1`).then(r=>r.json()),
          fetch(`${B}/discover/tv?api_key=${K}&language=en-US&with_origin_country=KR&with_genres=18&sort_by=first_air_date.desc&first_air_date.lte=${today}&vote_count.gte=5&page=1`).then(r=>r.json()),
          fetch(`${B}/discover/tv?api_key=${K}&language=en-US&with_origin_country=KR&with_genres=18&sort_by=first_air_date.desc&first_air_date.lte=${today}&vote_count.gte=5&page=2`).then(r=>r.json()),
          fetch(`${B}/discover/tv?api_key=${K}&language=en-US&with_origin_country=KR&with_genres=18&sort_by=vote_average.desc&vote_count.gte=200&page=1`).then(r=>r.json()),
          fetch(`${B}/discover/tv?api_key=${K}&language=en-US&with_origin_country=KR&with_genres=18&sort_by=vote_average.desc&vote_count.gte=200&page=2`).then(r=>r.json()),
        ]);

        const trending = [
          ...(trendR1.results || []),
          ...(trendR2.results || []),
          ...(trendR3.results || []),
        ].filter(m => m.poster_path);

        const toprated = (topR.results || []);
        const upcoming = (upR.results || []).filter(m => m.release_date && m.release_date.startsWith('2026'));

        const kdTrend = [
          ...(kdTrendR1.results || []),
          ...(kdTrendR2.results || []),
        ].filter(s => s.poster_path);

        const kdTop = [
          ...(kdTopR1.results || []),
          ...(kdTopR2.results || []),
        ].filter(s => s.poster_path);

        setHero(trending);
        showGenreBar(trending);

        document.getElementById('app').innerHTML = `
          <div id="genreBarInline"></div>
          <div class="row-section" style="animation-delay:0s">
            <div class="row-label">Trending <em>This Week</em></div>
            <div class="movie-row-outer"><div class="movie-row" id="row-trending"></div></div>
          </div>
          <div class="row-section" style="animation-delay:0.1s">
            <div class="row-label">Top <em>Rated</em></div>
            <div class="movie-row-outer"><div class="movie-row" id="row-toprated"></div></div>
          </div>
          <div class="row-section" style="animation-delay:0.2s">
            <div class="row-label">Coming <em>Soon</em></div>
            <div class="movie-row-outer"><div class="movie-row" id="row-upcoming"></div></div>
          </div>
          <div class="row-section" style="animation-delay:0.3s">
            <div class="row-label">K-Drama <em>New Releases</em></div>
            <div class="movie-row-outer"><div class="movie-row" id="row-kd-trend"></div></div>
          </div>
          <div class="row-section" style="animation-delay:0.4s">
            <div class="row-label">K-Drama <em>Top Rated</em></div>
            <div class="movie-row-outer"><div class="movie-row" id="row-kd-top"></div></div>
          </div>`;

        renderRow('row-trending', trending);
        renderRow('row-toprated', toprated);
        renderRow('row-upcoming', upcoming);
        renderKdramaRow('row-kd-trend', kdTrend);
        renderKdramaRow('row-kd-top',   kdTop);
      } catch { showError(); }
    };

    // 11. Autocomplete removed — search goes directly to results grid

    // ─────────────────────────────────────────────
    // 12. ENHANCE search results — color-coded rating badges
    // ─────────────────────────────────────────────
    const _origRenderSearchGrid = renderSearchGrid;
    window.renderSearchGrid = function(movies, query) {
      if (!movies.length) {
        document.getElementById('app').innerHTML = `<div class="empty-wrap" style="padding-top:120px"><div class="empty-ico">🎬</div><div class="empty-ttl">No results for "${query}"</div><div class="empty-sub">Try a different title or keyword.</div></div>`;
        return;
      }
      const cards = movies.map((m, i) => {
        const year = m.release_date ? m.release_date.slice(0,4) : '—';
        const rat = m.vote_average ? m.vote_average.toFixed(1) : '—';
        const rc = ratingClass(m.vote_average);
        const img = m.poster_path
          ? `<img class="search-poster" src="${P}${m.poster_path}" alt="" loading="lazy"/>`
          : `<div class="search-poster-ph">🎬</div>`;
        return `
          <div class="search-card" onclick="openM(${m.id})" style="animation:fadeIn 0.3s ${Math.min(i,11)*0.04}s both">
            ${img}
            <div class="search-rating-badge ${rc}">★ ${rat}</div>
            <div class="search-card-overlay">
              <div class="search-card-title">${m.title}</div>
              <div class="search-card-year">${year}</div>
            </div>
          </div>`;
      }).join('');
      document.getElementById('app').innerHTML = `
        <div class="search-results">
          <div class="search-head">
            <div class="search-head-title">Results for <em>"${query}"</em></div>
            <div class="search-count">${movies.length} films</div>
          </div>
          <div class="search-grid">${cards}</div>
        </div>`;
    };

    // ─────────────────────────────────────────────
    // 13. RIPPLE on movie cards + hero buttons
    // ─────────────────────────────────────────────
    document.addEventListener('click', e => {
      const card = e.target.closest('.nf-card-inner, .hero-btn, .btn-trailer, .btn-watch');
      if (card) addRipple(e, card);
    });

    // 14. My List nav link removed

    /* ─────────────────────────────────────────────
       15. SECURITY NOTE (API KEY)
       ─────────────────────────────────────────────
       The TMDB API key is currently embedded in frontend JS.
       For a production app, the safer approach is:

       Option A — Backend proxy (recommended):
         Create a lightweight serverless function (Netlify Function,
         Vercel Edge, Cloudflare Worker) that stores the key server-side
         and proxies requests to TMDB. Your frontend calls your own
         /api/tmdb?path=... endpoint instead of TMDB directly.

       Option B — Restricted key + rate limiting:
         In your TMDB account settings, restrict the key to only
         your domain (cine-searchs.netlify.app). This won't hide
         the key but limits its abuse potential.

       For a portfolio project, Option B is fine and takes 1 minute.
    ─────────────────────────────────────────────── */

    // Trigger initial loadAllRows with new enhancements
    loadAllRows();

    // ── PWA: Register Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('CineSearch SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }

    // ── PWA: Install prompt ──
    let deferredPrompt = null;
    const installBanner = document.getElementById('installBanner');

    // Show banner after 2s as fallback (works even without beforeinstallprompt)
    setTimeout(() => {
      if (installBanner && !window.matchMedia('(display-mode: standalone)').matches) {
        installBanner.style.display = 'flex';
      }
    }, 2000);

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installBanner) installBanner.style.display = 'flex';
      const btn = document.getElementById('installBtn');
      if (btn) btn.textContent = 'Install App';
    });

    document.addEventListener('click', (e) => {
      if (e.target.id === 'installBtn') {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
            if (installBanner) installBanner.style.display = 'none';
          });
        } else {
          alert('Para mag-install:\n\n1. I-tap ang \u22ee (3 dots) sa Chrome\n2. Piliin ang "Add to Home screen"\n3. I-tap ang "Add"');
        }
      }
      if (e.target.id === 'dismissInstall') {
        if (installBanner) installBanner.style.display = 'none';
      }
    });

    window.addEventListener('appinstalled', () => {
      if (installBanner) installBanner.style.display = 'none';
    });
  </script>
</body>
</html>
